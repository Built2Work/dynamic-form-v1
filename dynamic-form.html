<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trades Workforce Intake Form</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #BA7517;
    --amber-dark: #854F0B;
    --amber-darker: #633806;
    --amber-light: #FAEEDA;
    --amber-border: #FAC775;
    --green-bg: #EAF3DE;
    --green-text: #27500A;
    --green-border: #97C459;
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-tertiary: #888;
    --border: #d0cfc9;
    --border-light: #e8e7e3;
    --bg: #ffffff;
    --bg-secondary: #f5f4f0;
    --radius: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --text-primary: #f0ede8;
      --text-secondary: #b0ad a5;
      --text-tertiary: #706d65;
      --border: #3a3835;
      --border-light: #2e2c29;
      --bg: #1c1b18;
      --bg-secondary: #252420;
      --amber-light: #2a1f08;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-secondary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem 1rem;
    color: var(--text-primary);
  }

  .card {
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-light);
    width: 100%;
    max-width: 560px;
    padding: 2rem;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.75rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border-light);
  }

  .brand-icon {
    width: 36px;
    height: 36px;
    background: var(--amber);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-icon svg { display: block; }

  .brand-text { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .brand-sub { font-size: 12px; color: var(--text-tertiary); }

  /* Tabs */
  .tabs { display: flex; gap: 5px; margin-bottom: 1.25rem; }
  .tab {
    flex: 1;
    text-align: center;
    padding: 5px 4px;
    font-size: 10px;
    letter-spacing: .06em;
    text-transform: uppercase;
    border-radius: var(--radius);
    color: var(--text-tertiary);
    border: 1px solid transparent;
    font-family: var(--font);
  }
  .tab.act { background: var(--amber-light); color: var(--amber-darker); border-color: var(--amber); }
  .tab.dn { background: var(--bg-secondary); color: var(--text-secondary); }

  /* Progress */
  .pb { height: 3px; background: var(--border-light); border-radius: 2px; margin-bottom: 1.75rem; overflow: hidden; }
  .pf { height: 100%; background: var(--amber); border-radius: 2px; transition: width .35s ease; }

  /* Labels */
  .slbl { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
  .qtxt { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 1.25rem; line-height: 1.5; }
  .sub { font-size: 12px; color: var(--text-tertiary); margin: -.75rem 0 1rem; font-style: italic; }

  /* Options */
  .opts { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1.25rem; }
  .opt {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    cursor: pointer;
    font-size: 14px;
    color: var(--text-primary);
    transition: all .12s;
    user-select: none;
    font-family: var(--font);
    text-align: left;
  }
  .opt:hover { background: var(--bg-secondary); }
  .opt.sel { border-color: var(--amber); background: var(--amber-light); color: var(--amber-darker); }
  .dot { width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; transition: all .12s; }
  .sq  { width: 15px; height: 15px; border-radius: 3px; border: 1.5px solid var(--border); flex-shrink: 0; transition: all .12s; }
  .opt.sel .dot, .opt.sel .sq { background: var(--amber); border-color: var(--amber); }

  /* Scale */
  .scale { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 1.25rem; }
  .sopt {
    text-align: center;
    padding: 12px 6px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-secondary);
    transition: all .12s;
    user-select: none;
    line-height: 1.2;
    font-family: var(--font);
  }
  .sopt .slbl2 { font-size: 10px; font-weight: 400; display: block; margin-top: 3px; color: inherit; }
  .sopt.sel { border-color: var(--amber); background: var(--amber-light); color: var(--amber-darker); }

  /* Form fields */
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .fl { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .fl .r { color: var(--amber); }
  input[type=text], input[type=tel], input[type=email], input[type=date], select {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    font-family: var(--font);
  }
  input:focus, select:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(186,117,23,.15); }
  .oinp {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    margin-bottom: 1.25rem;
    font-family: var(--font);
  }
  .oinp:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(186,117,23,.15); }

  /* Gender */
  .grow { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .gopt {
    flex: 1;
    text-align: center;
    padding: 9px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    color: var(--text-primary);
    transition: all .12s;
    user-select: none;
    font-family: var(--font);
  }
  .gopt.sel { border-color: var(--amber); background: var(--amber-light); color: var(--amber-darker); font-weight: 500; }

  /* Certifications */
  .cgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 1.25rem; }
  .copt {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-primary);
    transition: all .12s;
    user-select: none;
    font-family: var(--font);
  }
  .copt:hover { background: var(--bg-secondary); }
  .copt.sel { border-color: var(--amber); background: var(--amber-light); color: var(--amber-darker); }
  .csq { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--border); flex-shrink: 0; }
  .copt.sel .csq { background: var(--amber); border-color: var(--amber); }

  /* CDL sub-panel */
  .cdlbox { grid-column: 1 / -1; padding: 12px 14px; background: var(--bg-secondary); border-radius: var(--radius); border: 1px solid var(--border-light); }
  .cdlttl { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 7px; font-weight: 500; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 4px 11px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all .12s;
    user-select: none;
    white-space: nowrap;
    font-family: var(--font);
  }
  .chip.sel { background: var(--amber); border-color: var(--amber); color: #fff; }

  /* Navigation */
  .navrow {
    display: flex;
    gap: 10px;
    align-items: center;
    padding-top: .75rem;
    border-top: 1px solid var(--border-light);
    margin-top: .25rem;
  }
  .bcont {
    padding: 10px 22px;
    background: var(--amber);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: background .15s;
  }
  .bcont:hover:not(:disabled) { background: var(--amber-dark); }
  .bcont:disabled { background: var(--border); color: var(--text-tertiary); cursor: not-allowed; }
  .bback {
    padding: 10px 16px;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    cursor: pointer;
    font-family: var(--font);
    transition: all .15s;
  }
  .bback:hover { background: var(--bg-secondary); }

  /* Counter tag */
  .ctag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--bg-secondary); color: var(--text-tertiary); margin-bottom: .75rem; border: 1px solid var(--border-light); }
  .ctag.full { background: var(--amber-light); color: var(--amber-darker); border-color: var(--amber-border); }

  /* Done screen */
  .done-wrap { text-align: center; padding: 2rem 0; }
  .done-c { width: 56px; height: 56px; border-radius: 50%; background: var(--green-bg); border: 1px solid var(--green-border); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }

  /* Animation */
  .scr { animation: fi .18s ease; }
  @keyframes fi { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 480px) {
    body { padding: 0; }
    .card { border-radius: 0; border-left: none; border-right: none; min-height: 100vh; }
    .row2 { grid-template-columns: 1fr; }
    .row3 { grid-template-columns: 1fr 1fr; }
    .cgrid { grid-template-columns: 1fr; }
    .scale { grid-template-columns: repeat(4, 1fr); gap: 4px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="brand-text">Trades Workforce</div>
      <div class="brand-sub">Participant intake form</div>
    </div>
  </div>
  <div id="root"></div>
</div>

<script>
const S = {
  ppi: { first:'', last:'', phone:'', email:'', addr1:'', addr2:'', city:'', st:'', zip:'', country:'US', gender:'', dob:'' },
  job: { j1:null, j2:null, j3:null, j4:null, j5:[], j6:null, j6o:'', j7:null, j7o:'', j8:null, j8o:'', j9:null, j9o:'', j10:null, j10o:'', j11:null, j11o:'', j12:null, j12o:'', j13:[], j14:null, j15:null },
  edu: { e1:null, e1o:'', e2:null, e3:null, e4:null, e5:null, e5o:'', e6:[], cdlC:[], cdlE:[], e_pur:null, e_puro:'' }
};
const hist = [];
let cur = 'ppi';

const ORD = ['ppi','j1','j2','j3','j4','j5','j6','j7','j8','j9','j10','j11','j12','j13','j15','j14','e_pur','e1','e2','e3','e4','e5','e6','done'];
function pctOf(id) { const i = ORD.indexOf(id); return Math.max(4, Math.round(i / (ORD.length - 1) * 100)); }
function secOf(id) { if (id === 'ppi') return 'ppi'; if (id[0] === 'j') return 'job'; return 'edu'; }

function nextOf(id) {
  const j = S.job, e = S.edu;
  const nm = { j1:'j2', j5:'j11', j6:'j11', j7:'j12', j8:'j12', j9:'j11', j10:'j11', j11:'j14', j12:'j14', j14:'e1', e2:'e6', e3:'e6', e4:'e6', e5:'e6', e_pur:'e6', e6:'done' };
  if (id === 'ppi') return 'j1';
  if (nm[id]) return nm[id];
  if (id === 'j2') { if (j.j2 === 'retired') return 'e1'; if (j.j2 === 'trades') return 'j3'; return 'j4'; }
  if (id === 'j3') { const m = { construction:'j5', mechanical:'j6', electrical:'j7', plumbing:'j8', welding:'j9', hvac:'j10', warehouse:'j11', manufacturing:'j11', other:'j11' }; return m[j.j3] || 'j11'; }
  if (id === 'j4') {
    if (j.j2 === 'student') return (j.j4 === 1 || j.j4 === 2) ? 'j15' : 'j13';
    return (j.j4 === 1 || j.j4 === 2) ? 'e1' : 'j13';
  }
  if (id === 'j13') return j.j2 === 'student' ? 'j15' : 'j14';
  if (id === 'j15') return j.j15 === 'yes' ? 'j14' : 'e_pur';
  if (id === 'e1') { const m = { hs:'e6', associates:'e5', bachelors:'e4', masters:'e3', doctorate:'e2', other:'e6' }; return m[e.e1] || 'e6'; }
  return 'done';
}

function go(to) { hist.push(cur); cur = to; render(); }
function goNext() { go(nextOf(cur)); }
function goBack() { if (hist.length) { cur = hist.pop(); render(); } }
function rc() { const b = document.querySelector('.bcont'); if (b) b.disabled = !can(cur); }

function can(id) {
  const p = S.ppi, j = S.job, e = S.edu;
  if (id === 'ppi') return !!(p.first.trim() && p.last.trim() && p.phone.trim() && p.email.trim() && p.addr1.trim() && p.city.trim() && p.st.trim() && p.zip.trim() && p.country && p.gender && p.dob);
  if (id === 'j1') return !!j.j1;
  if (id === 'j2') return !!j.j2;
  if (id === 'j3') return !!j.j3;
  if (id === 'j4') return !!j.j4;
  if (id === 'j5') return j.j5.length > 0;
  if (id === 'j6') return !!j.j6 && (j.j6 !== 'other' || j.j6o.trim().length > 0);
  if (id === 'j7') return !!j.j7 && (j.j7 !== 'other' || j.j7o.trim().length > 0);
  if (id === 'j8') return !!j.j8 && (j.j8 !== 'other' || j.j8o.trim().length > 0);
  if (id === 'j9') return !!j.j9 && (j.j9 !== 'other' || j.j9o.trim().length > 0);
  if (id === 'j10') return !!j.j10 && (j.j10 !== 'other' || j.j10o.trim().length > 0);
  if (id === 'j11') return !!j.j11 && (j.j11 !== 'other' || j.j11o.trim().length > 0);
  if (id === 'j12') return !!j.j12 && (j.j12 !== 'other' || j.j12o.trim().length > 0);
  if (id === 'j13') return j.j13.length > 0;
  if (id === 'j14') return !!j.j14;
  if (id === 'j15') return !!j.j15;
  if (id === 'e1') return !!e.e1 && (e.e1 !== 'other' || e.e1o.trim().length > 0);
  if (id === 'e2') return !!e.e2;
  if (id === 'e3') return !!e.e3;
  if (id === 'e4') return !!e.e4;
  if (id === 'e5') return !!e.e5 && (e.e5 !== 'other' || e.e5o.trim().length > 0);
  if (id === 'e_pur') return !!e.e_pur && (e.e_pur !== 'other' || e.e_puro.trim().length > 0);
  return true;
}

function pick(key, val) {
  const c = key[0] === 'j' ? S.job : S.edu;
  c[key] = val;
  const okey = key === 'e_pur' ? 'e_puro' : key + 'o';
  if (okey in c && val !== 'other') c[okey] = '';
  render();
}
function upO(key, val) {
  const c = key[0] === 'j' ? S.job : S.edu;
  const okey = key === 'e_pur' ? 'e_puro' : key + 'o';
  c[okey] = val; rc();
}
function pickM(key, val, max) {
  const c = key[0] === 'j' ? S.job : S.edu;
  const a = c[key];
  if (a.includes(val)) { c[key] = a.filter(v => v !== val); }
  else if (!max || a.length < max) { c[key] = [...a, val]; }
  render();
}
function pickCert(v) {
  const a = S.edu.e6;
  if (a.includes(v)) { S.edu.e6 = a.filter(x => x !== v); if (v === 'cdl') { S.edu.cdlC = []; S.edu.cdlE = []; } }
  else S.edu.e6 = [...a, v];
  render();
}
function pickCDLC(v) { const a = S.edu.cdlC; S.edu.cdlC = a.includes(v) ? a.filter(x => x !== v) : [...a, v]; render(); }
function pickCDLE(v) { const a = S.edu.cdlE; S.edu.cdlE = a.includes(v) ? a.filter(x => x !== v) : [...a, v]; render(); }
function pickG(g) { S.ppi.gender = g; render(); }
function x(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function tabsHtml() {
  const s = secOf(cur);
  return '<div class="tabs">' + [['ppi','Personal info'],['job','Job data'],['edu','Education']].map(([id,l]) => {
    const done = (id === 'ppi' && s !== 'ppi') || (id === 'job' && (s === 'edu' || cur === 'done'));
    const act = id === s || (id === 'edu' && cur === 'done');
    return `<div class="tab ${act ? 'act' : done ? 'dn' : ''}">${l}</div>`;
  }).join('') + '</div>';
}

function rOpt(key, val, lbl) {
  const c = key[0] === 'j' ? S.job : S.edu;
  const sel = c[key] === val;
  return `<div class="opt ${sel ? 'sel' : ''}" onclick="pick('${key}','${x(val)}')">`
       + `<span class="dot"></span>${lbl}</div>`;
}
function rOptM(key, val, lbl, max) {
  const c = key[0] === 'j' ? S.job : S.edu;
  const sel = c[key].includes(val);
  return `<div class="opt ${sel ? 'sel' : ''}" onclick="pickM('${key}','${x(val)}',${max || 0})">`
       + `<span class="sq"></span>${lbl}</div>`;
}
function oinp(key, ph) {
  const c = key[0] === 'j' ? S.job : S.edu;
  const okey = key === 'e_pur' ? 'e_puro' : key + 'o';
  if (c[key] !== 'other') return '';
  return `<input class="oinp" type="text" placeholder="${ph}" value="${x(c[okey] || '')}" oninput="upO('${key}',this.value)">`;
}
function navRow(lbl) {
  lbl = lbl || 'Continue';
  return `<div class="navrow">${hist.length ? '<button class="bback" onclick="goBack()">Back</button>' : ''}` +
         `<button class="bcont" ${can(cur) ? '' : 'disabled'} onclick="goNext()">${lbl}</button></div>`;
}

function screenHTML() {
  const p = S.ppi, j = S.job, e = S.edu;

  /* ── PPI ── */
  if (cur === 'ppi') {
    const ctrs = ['US','CA','MX','GB','AU','NZ','DE','FR','ZA','BR','IN','JP','CN','Other'];
    return `
      <div class="slbl">Section 1 of 3 — Personal information</div>
      <div class="qtxt">Participant information</div>
      <div class="row2">
        <div class="fg"><div class="fl">First name <span class="r">*</span></div><input id="pf" type="text" value="${x(p.first)}" oninput="S.ppi.first=this.value;rc()" placeholder="Jane"></div>
        <div class="fg"><div class="fl">Last name <span class="r">*</span></div><input id="pl" type="text" value="${x(p.last)}" oninput="S.ppi.last=this.value;rc()" placeholder="Smith"></div>
      </div>
      <div class="row2">
        <div class="fg"><div class="fl">Phone number <span class="r">*</span></div><input id="pp" type="tel" value="${x(p.phone)}" oninput="S.ppi.phone=this.value;rc()" placeholder="+1 (555) 000-0000"></div>
        <div class="fg"><div class="fl">Email address <span class="r">*</span></div><input id="pe" type="email" value="${x(p.email)}" oninput="S.ppi.email=this.value;rc()" placeholder="jane@example.com"></div>
      </div>
      <div class="fg"><div class="fl">Street address <span class="r">*</span></div><input id="pa1" type="text" value="${x(p.addr1)}" oninput="S.ppi.addr1=this.value;rc()" placeholder="123 Main Street"></div>
      <div class="fg"><div class="fl">Address line 2 <span style="font-size:11px;color:var(--text-tertiary)">(optional)</span></div><input id="pa2" type="text" value="${x(p.addr2)}" oninput="S.ppi.addr2=this.value" placeholder="Apt, suite, unit, floor…"></div>
      <div class="row3">
        <div class="fg"><div class="fl">City <span class="r">*</span></div><input id="pci" type="text" value="${x(p.city)}" oninput="S.ppi.city=this.value;rc()" placeholder="Chicago"></div>
        <div class="fg"><div class="fl">State / Province <span class="r">*</span></div><input id="pst" type="text" value="${x(p.st)}" oninput="S.ppi.st=this.value;rc()" placeholder="IL"></div>
        <div class="fg"><div class="fl">ZIP / Postal <span class="r">*</span></div><input id="pz" type="text" value="${x(p.zip)}" oninput="S.ppi.zip=this.value;rc()" placeholder="60601"></div>
      </div>
      <div class="fg"><div class="fl">Country <span class="r">*</span></div>
        <select onchange="S.ppi.country=this.value;rc()">${ctrs.map(c => `<option value="${c}"${p.country===c?' selected':''}>${c}</option>`).join('')}</select>
      </div>
      <div class="fg" style="margin-top:4px">
        <div class="fl" style="margin-bottom:7px">Gender <span class="r">*</span></div>
        <div class="grow">
          <div class="gopt ${p.gender==='male'?'sel':''}" onclick="pickG('male')">Male</div>
          <div class="gopt ${p.gender==='female'?'sel':''}" onclick="pickG('female')">Female</div>
        </div>
      </div>
      <div class="fg" style="margin-bottom:1.25rem"><div class="fl">Date of birth <span class="r">*</span></div><input id="pd" type="date" value="${x(p.dob)}" oninput="S.ppi.dob=this.value;rc()" style="max-width:200px"></div>
      ${navRow('Continue to job information')}
    `;
  }

  /* ── J1 ── */
  if (cur === 'j1') return `
    <div class="slbl">Job data — Question 1 of 14</div>
    <div class="qtxt">Are you interested in new job opportunities?</div>
    <div class="opts">
      ${rOpt('j1','yes','Yes')}
      ${rOpt('j1','maybe','Maybe')}
      ${rOpt('j1','no','No — not at this time')}
    </div>
    ${navRow()}
  `;

  /* ── J2 ── */
  if (cur === 'j2') return `
    <div class="slbl">Job data — Question 2 of 14</div>
    <div class="qtxt">What is your current job status?</div>
    <div class="opts">
      ${rOpt('j2','trades','Employed — in the trades')}
      ${rOpt('j2','other-ind','Employed — other industry')}
      ${rOpt('j2','unemployed','Unemployed')}
      ${rOpt('j2','student','Student')}
      ${rOpt('j2','retired','Retired')}
    </div>
    ${navRow()}
  `;

  /* ── J3 ── */
  if (cur === 'j3') return `
    <div class="slbl">Job data — Question 3 of 14</div>
    <div class="qtxt">What trade industry are you currently employed in?</div>
    <div class="opts">
      ${rOpt('j3','construction','Construction')}
      ${rOpt('j3','mechanical','Mechanical')}
      ${rOpt('j3','electrical','Electrical')}
      ${rOpt('j3','plumbing','Plumbing')}
      ${rOpt('j3','welding','Welding')}
      ${rOpt('j3','hvac','HVAC')}
      ${rOpt('j3','warehouse','Warehouse')}
      ${rOpt('j3','manufacturing','Manufacturing')}
      ${rOpt('j3','other','Other')}
    </div>
    ${navRow()}
  `;

  /* ── J4 ── */
  if (cur === 'j4') return `
    <div class="slbl">Job data — Question 4 of 14</div>
    <div class="qtxt">If given the opportunity, how likely would you be to start a career in construction or the trades?</div>
    <div class="scale">
      ${[1,2,3,4].map(n => {
        const ll = {1:'Very unlikely',2:'Unlikely',3:'Likely',4:'Very likely'};
        return `<div class="sopt ${j.j4===n?'sel':''}" onclick="S.job.j4=${n};render()">${n}<span class="slbl2">${ll[n]}</span></div>`;
      }).join('')}
    </div>
    ${navRow()}
  `;

  /* ── J5 ── */
  if (cur === 'j5') return `
    <div class="slbl">Job data — Question 5 of 14</div>
    <div class="qtxt">What type of construction are you involved in?</div>
    <div class="sub">Select all that apply</div>
    <div class="opts">
      ${['Residential','Commercial','Industrial','Infrastructure / Civil','Other'].map(v => rOptM('j5', v, v, 0)).join('')}
    </div>
    ${navRow()}
  `;

  /* ── J6 ── */
  if (cur === 'j6') return `
    <div class="slbl">Job data — Question 6 of 14</div>
    <div class="qtxt">What type of mechanic are you?</div>
    <div class="opts">
      ${rOpt('j6','auto','Auto mechanic')}
      ${rOpt('j6','diesel','Diesel mechanic')}
      ${rOpt('j6','heavy','Heavy equipment technician')}
      ${rOpt('j6','other','Other')}
    </div>
    ${oinp('j6','Describe your mechanic specialty')}
    ${navRow()}
  `;

  /* ── J7 ── */
  if (cur === 'j7') return `
    <div class="slbl">Job data — Question 7 of 14</div>
    <div class="qtxt">What type of electrician are you?</div>
    <div class="opts">
      ${rOpt('j7','residential','Residential')}
      ${rOpt('j7','commercial','Commercial')}
      ${rOpt('j7','industrial','Industrial')}
      ${rOpt('j7','inside-wireman','Inside wireman')}
      ${rOpt('j7','lineman','Lineman')}
      ${rOpt('j7','installation','Installation technician')}
      ${rOpt('j7','other','Other')}
    </div>
    ${oinp('j7','Describe your electrician specialty')}
    ${navRow()}
  `;

  /* ── J8 ── */
  if (cur === 'j8') return `
    <div class="slbl">Job data — Question 8 of 14</div>
    <div class="qtxt">What type of plumber are you?</div>
    <div class="opts">
      ${rOpt('j8','residential','Residential plumber')}
      ${rOpt('j8','commercial','Commercial plumber')}
      ${rOpt('j8','pipefitter','Pipefitter')}
      ${rOpt('j8','gas-fitter','Gas fitter')}
      ${rOpt('j8','other','Other')}
    </div>
    ${oinp('j8','Describe your plumbing specialty')}
    ${navRow()}
  `;

  /* ── J9 ── */
  if (cur === 'j9') return `
    <div class="slbl">Job data — Question 9 of 14</div>
    <div class="qtxt">What type of welder are you?</div>
    <div class="opts">
      ${rOpt('j9','structural','Structural welder')}
      ${rOpt('j9','pipe','Pipe welder')}
      ${rOpt('j9','mig','MIG / GMAW welder')}
      ${rOpt('j9','tig','TIG / GTAW welder')}
      ${rOpt('j9','stick','Stick / SMAW welder')}
      ${rOpt('j9','combo','Combination welder')}
      ${rOpt('j9','other','Other')}
    </div>
    ${oinp('j9','Describe your welding specialty')}
    ${navRow()}
  `;

  /* ── J10 ── */
  if (cur === 'j10') return `
    <div class="slbl">Job data — Question 10 of 14</div>
    <div class="qtxt">What is your role in the HVAC industry?</div>
    <div class="opts">
      ${rOpt('j10','service','Service technician')}
      ${rOpt('j10','installer','Installer')}
      ${rOpt('j10','refrigeration','Refrigeration technician')}
      ${rOpt('j10','controls','Controls technician')}
      ${rOpt('j10','other','Other')}
    </div>
    ${oinp('j10','Describe your HVAC role')}
    ${navRow()}
  `;

  /* ── J11 ── */
  if (cur === 'j11') return `
    <div class="slbl">Job data — Question 11 of 14</div>
    <div class="qtxt">Where are you in your career progression?</div>
    <div class="opts">
      ${rOpt('j11','labor','Labor / Apprentice')}
      ${rOpt('j11','journeyman','Journeyman / Specialist')}
      ${rOpt('j11','supervisor','Supervisor / Foreman')}
      ${rOpt('j11','management','Senior management')}
      ${rOpt('j11','other','Other')}
    </div>
    ${oinp('j11','Describe your current career level')}
    ${navRow()}
  `;

  /* ── J12 ── */
  if (cur === 'j12') return `
    <div class="slbl">Job data — Question 12 of 14</div>
    <div class="qtxt">What license level are you currently at?</div>
    <div class="opts">
      ${rOpt('j12','apprentice','Apprentice')}
      ${rOpt('j12','journeyman','Journeyman')}
      ${rOpt('j12','master','Master')}
      ${rOpt('j12','other','Other')}
    </div>
    ${oinp('j12','Describe your license level')}
    ${navRow()}
  `;

  /* ── J13 ── */
  if (cur === 'j13') {
    const cnt = j.j13.length;
    return `
      <div class="slbl">Job data — Question 13 of 14</div>
      <div class="qtxt">Which trade industries interest you most as a career?</div>
      <div class="sub">Select up to 2</div>
      <div class="ctag ${cnt >= 2 ? 'full' : ''}">${cnt}/2 selected</div>
      <div class="opts">
        ${['Construction','Mechanical','Plumbing','Electrical','HVAC','Welding','Warehouse','Manufacturing'].map(v => rOptM('j13', v, v, 2)).join('')}
      </div>
      ${navRow()}
    `;
  }

  /* ── J15 (student experience check) ── */
  if (cur === 'j15') return `
    <div class="slbl">Job data — student experience</div>
    <div class="qtxt">Do you have any experience working in the trades or construction?</div>
    <div class="opts">
      ${rOpt('j15','yes','Yes — I have some trade or construction experience')}
      ${rOpt('j15','no','No — I have no trade or construction experience')}
    </div>
    ${navRow()}
  `;

  /* ── J14 ── */
  if (cur === 'j14') return `
    <div class="slbl">Job data — Question 14 of 14</div>
    <div class="qtxt">How many years of experience do you have in your field?</div>
    <div class="opts">
      ${rOpt('j14','<1','Less than 1 year')}
      ${rOpt('j14','1-3','1–3 years')}
      ${rOpt('j14','4-7','4–7 years')}
      ${rOpt('j14','8+','8 or more years')}
    </div>
    ${navRow('Continue to education')}
  `;

  /* ── E_PUR (degree being pursued — students with no experience) ── */
  if (cur === 'e_pur') return `
    <div class="slbl">Education — degree in progress</div>
    <div class="qtxt">What degree or program are you currently pursuing?</div>
    <div class="opts">
      ${rOpt('e_pur','hs','High school diploma / GED')}
      ${rOpt('e_pur','associates','Associate\'s degree')}
      ${rOpt('e_pur','bachelors','Bachelor\'s degree')}
      ${rOpt('e_pur','masters','Master\'s degree')}
      ${rOpt('e_pur','doctorate','Doctorate (PhD / EdD)')}
      ${rOpt('e_pur','trade-program','Trade / vocational program')}
      ${rOpt('e_pur','other','Other')}
    </div>
    ${oinp('e_pur','Describe your program or credential')}
    ${navRow()}
  `;

  /* ── E1 ── */
  if (cur === 'e1') return `
    <div class="slbl">Education — Question 1 of 6</div>
    <div class="qtxt">What is your highest level of education?</div>
    <div class="opts">
      ${rOpt('e1','hs','High school diploma / GED')}
      ${rOpt('e1','associates','Associate\'s degree')}
      ${rOpt('e1','bachelors','Bachelor\'s degree')}
      ${rOpt('e1','masters','Master\'s degree')}
      ${rOpt('e1','doctorate','Doctorate (PhD / EdD)')}
      ${rOpt('e1','other','Other')}
    </div>
    ${oinp('e1','Describe your credential (e.g., trade school, vocational certificate)')}
    ${navRow()}
  `;

  /* ── E2 ── */
  if (cur === 'e2') return `
    <div class="slbl">Education — Question 2 of 6</div>
    <div class="qtxt">Does your doctorate relate to the trades or construction industry?</div>
    <div class="opts">
      ${rOpt('e2','yes','Yes — it is trade or construction related')}
      ${rOpt('e2','no','No — unrelated field')}
    </div>
    ${navRow()}
  `;

  /* ── E3 ── */
  if (cur === 'e3') return `
    <div class="slbl">Education — Question 3 of 6</div>
    <div class="qtxt">Does your master's degree relate to the trades or construction industry?</div>
    <div class="opts">
      ${rOpt('e3','yes','Yes — it is trade or construction related')}
      ${rOpt('e3','no','No — unrelated field')}
    </div>
    ${navRow()}
  `;

  /* ── E4 ── */
  if (cur === 'e4') return `
    <div class="slbl">Education — Question 4 of 6</div>
    <div class="qtxt">What type of bachelor's degree do you have?</div>
    <div class="opts">
      ${rOpt('e4','civil','Civil engineering')}
      ${rOpt('e4','mechanical','Mechanical engineering')}
      ${rOpt('e4','electrical','Electrical engineering')}
      ${rOpt('e4','chemical','Chemical engineering')}
      ${rOpt('e4','construction-mgmt','Construction management')}
      ${rOpt('e4','trade-other','Other trade / construction related')}
      ${rOpt('e4','not-related','Not trade related')}
    </div>
    ${navRow()}
  `;

  /* ── E5 ── */
  if (cur === 'e5') return `
    <div class="slbl">Education — Question 5 of 6</div>
    <div class="qtxt">What industry or field is your associate's degree in?</div>
    <div class="opts">
      ${rOpt('e5','construction-tech','Construction technology')}
      ${rOpt('e5','electrical-tech','Electrical technology')}
      ${rOpt('e5','hvac-tech','HVAC/R technology')}
      ${rOpt('e5','welding-tech','Welding technology')}
      ${rOpt('e5','diesel-heavy','Diesel / heavy equipment technology')}
      ${rOpt('e5','plumbing-pip','Plumbing & pipefitting technology')}
      ${rOpt('e5','industrial-maint','Industrial maintenance technology')}
      ${rOpt('e5','civil-tech','Civil engineering technology')}
      ${rOpt('e5','cdl-trans','CDL / commercial transportation')}
      ${rOpt('e5','other','Other')}
    </div>
    ${oinp('e5','Describe your field of study')}
    ${navRow()}
  `;

  /* ── E6 ── */
  if (cur === 'e6') {
    const certs = [
      ['cdl','CDL — Commercial Driver\'s License'],
      ['heo','HEO Cert — Heavy Equipment Operator'],
      ['cw','CW — Certified Welder'],
      ['cwi','CWI — Certified Welding Inspector'],
      ['cco','CCO — Crane Operator Certification'],
      ['hvac-exc','HVAC Excellence Certification'],
      ['j-elec','Journeyman Electrician License'],
      ['m-elec','Master Electrician License'],
      ['ccm','CCM — Certified Construction Manager'],
      ['pmp','PMP — Project Mgmt Professional'],
      ['j-plumb','Journeyman Plumber License'],
      ['m-plumb','Master Plumber License'],
      ['clc','CLC — Construction Lean Certificate'],
      ['epa608','EPA 608 Certification'],
      ['nec','NEC Certification'],
      ['mcaa','MCAA Certification'],
      ['ase','ASE Certification'],
      ['osha10','OSHA 10'],
      ['osha30','OSHA 30'],
    ];
    const hasCDL = e.e6.includes('cdl');
    return `
      <div class="slbl">Education — Question 6 of 6</div>
      <div class="qtxt">Select all trade certifications you currently hold</div>
      <div class="sub">Select all that apply — leave blank if none</div>
      <div class="cgrid">
        ${certs.map(([v,l]) => `<div class="copt ${e.e6.includes(v)?'sel':''}" onclick="pickCert('${v}')"><span class="csq"></span>${l}</div>`).join('')}
        ${hasCDL ? `
        <div class="cdlbox">
          <div class="cdlttl">CDL class</div>
          <div class="chips" style="margin-bottom:10px">
            ${['Class A','Class B','Class C'].map(v => `<div class="chip ${e.cdlC.includes(v)?'sel':''}" onclick="pickCDLC('${v}')">${v}</div>`).join('')}
          </div>
          <div class="cdlttl">Endorsements</div>
          <div class="chips">
            ${[['T','Double/Triple Trailers'],['P','Passenger'],['N','Tank Vehicle'],['H','Hazardous Materials'],['X','Hazmat + Tank'],['S','School Bus']].map(([v,l]) => `<div class="chip ${e.cdlE.includes(v)?'sel':''}" onclick="pickCDLE('${v}')">${v} — ${l}</div>`).join('')}
          </div>
        </div>` : ''}
      </div>
      ${navRow('Submit form')}
    `;
  }

  /* ── DONE ── */
  if (cur === 'done') return `
    <div class="done-wrap">
      <div class="done-c">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <path d="M5 13.5l6 6 10-11" stroke="${getComputedStyle(document.documentElement).getPropertyValue('--green-text').trim() || '#27500A'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div style="font-size:18px;font-weight:600;color:var(--text-primary);margin-bottom:8px">Form submitted</div>
      <div style="font-size:14px;color:var(--text-secondary);max-width:300px;margin:0 auto 1.75rem;line-height:1.6">Thank you. Your information has been recorded successfully.</div>
      <button class="bback" onclick="restart()">Start over</button>
    </div>
  `;

  return '';
}

function restart() {
  Object.assign(S.ppi, {first:'',last:'',phone:'',email:'',addr1:'',addr2:'',city:'',st:'',zip:'',country:'US',gender:'',dob:''});
  Object.assign(S.job, {j1:null,j2:null,j3:null,j4:null,j5:[],j6:null,j6o:'',j7:null,j7o:'',j8:null,j8o:'',j9:null,j9o:'',j10:null,j10o:'',j11:null,j11o:'',j12:null,j12o:'',j13:[],j14:null,j15:null});
  Object.assign(S.edu, {e1:null,e1o:'',e2:null,e3:null,e4:null,e5:null,e5o:'',e6:[],cdlC:[],cdlE:[],e_pur:null,e_puro:''});
  hist.length = 0; cur = 'ppi'; render();
}

function render() {
  const fid = document.activeElement && document.activeElement.id;
  const fpos = document.activeElement && document.activeElement.selectionStart;
  const fend = document.activeElement && document.activeElement.selectionEnd;
  document.getElementById('root').innerHTML =
    `<div class="scr">${tabsHtml()}<div class="pb"><div class="pf" style="width:${pctOf(cur)}%"></div></div>${screenHTML()}</div>`;
  if (fid) {
    const el = document.getElementById(fid);
    if (el) { el.focus(); try { el.setSelectionRange(fpos, fend); } catch(err) {} }
  }
}

render();
</script>
</body>
</html>>
